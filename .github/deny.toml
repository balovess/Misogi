# =============================================================================
# cargo-deny Configuration
# =============================================================================
# Configuration for cargo-deny license and advisory checks.
#
# See: https://embarkstudios.github.io/cargo-deny/

# =============================================================================
# Advisories (Security Vulnerabilities)
# =============================================================================
[advisories]
# Database URL (default is crates.io advisory database)
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Fetch the database if it's missing
fetch = true
# Ignore specific advisories (must have justification)
ignore = [
    # RSA Marvin Attack - no fix available for rsa 0.9.x
    # See .cargo/audit.toml for full justification
    { id = "RUSTSEC-2023-0071", reason = "No fix available for rsa 0.9.x, used only for JWT signing in controlled environments" },
    # rustls-webpki 0.101.7 vulnerabilities (AWS SDK indirect dependency)
    { id = "RUSTSEC-2026-0098", reason = "AWS SDK indirect dependency, main app uses rustls 0.23.40 with webpki 0.103.13" },
    { id = "RUSTSEC-2026-0099", reason = "AWS SDK indirect dependency, main app uses rustls 0.23.40 with webpki 0.103.13" },
    { id = "RUSTSEC-2026-0104", reason = "AWS SDK indirect dependency, main app uses rustls 0.23.40 with webpki 0.103.13" },
]
# Threshold for vulnerability severity
severity-threshold = "medium"

# =============================================================================
# Licenses
# =============================================================================
[licenses]
# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
# Confidence threshold for license detection
confidence-threshold = 0.8
# Private crates that don't need license checks
private = { ignore = true }
# Exceptions for specific crates
exceptions = [
    # Crossbeam uses MPL-2.0 which is copyleft but allows static linking
    { allow = ["MPL-2.0"], name = "crossbeam-epoch" },
    { allow = ["MPL-2.0"], name = "crossbeam-utils" },
]

# =============================================================================
# Bans (Duplicate/Conflicting Dependencies)
# =============================================================================
[bans]
# Allow multiple versions of the same crate
multiple-versions = "warn"
# Allow specific duplicates with known reasons
skip = [
    # Common duplicates in the ecosystem
    { name = "itertools", version = "0.11.0" },
    { name = "itertools", version = "0.12.0" },
    { name = "indexmap", version = "1.9.3" },
    { name = "indexmap", version = "2.2.3" },
]
# Deny specific crates
deny = [
    # Crates with known issues or security concerns
    { name = "openssl", reason = "Use rustls instead for pure Rust TLS" },
]

# =============================================================================
# Sources
# =============================================================================
[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
# Allow git dependencies for specific cases
unknown-git = "warn"
# Allow specific git sources
allow-git = [
    "https://github.com/rust-lang/crates.io",
]
