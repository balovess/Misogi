# =============================================================================
# Docker Build Verification Pipeline
# =============================================================================
#
# Validates Docker image builds for Misogi CDR system.
#
# Jobs:
#   1. docker-lint    — Hadolint Dockerfile syntax check
#   2. docker-build   — Multi-platform image build test
#   3. docker-test    — Container startup and health check
#
# Note: This workflow does NOT push images to any registry.
#       It only validates that Docker builds succeed.

name: Docker CI

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker/Dockerfile.prod'
      - 'docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker/Dockerfile.prod'
      - 'docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Docker Lint — Hadolint Check
  # ===========================================================================
  # Validates Dockerfile syntax and best practices using Hadolint.

  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile (root)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-root.sarif

      - name: Lint Dockerfile.prod
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.prod
          format: sarif
          output-file: hadolint-prod.sarif

      - name: Upload Hadolint results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: .
          category: hadolint

  # ===========================================================================
  # Job 2: Docker Build — Multi-Platform Build Test
  # ===========================================================================
  # Builds Docker images for linux/amd64 and linux/arm64 platforms.
  # Uses buildx for cross-platform support without emulation.

  docker-build:
    name: Docker Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: docker-lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            dockerfile: Dockerfile
          - platform: linux/arm64
            dockerfile: Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          tags: misogi:test
          build-args: |
            BUILD_PROFILE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.prod
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          tags: misogi:prod-test
          build-args: |
            BUILD_PROFILE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 3: Docker Test — Container Runtime Test
  # ===========================================================================
  # Starts container and verifies health check passes.
  # Only runs on linux/amd64 for speed (arm64 requires emulation).

  docker-test:
    name: Docker Runtime Test
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: misogi:test
          build-args: |
            BUILD_PROFILE=release
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and verify startup
        run: |
          # Start container in background
          docker run -d --name misogi-test \
            -p 3001:3001 \
            -e MISOGI_LOG_LEVEL=info \
            misogi:test

          # Wait for container to start
          sleep 10

          # Check if container is running
          if [ "$(docker inspect -f '{{.State.Running}}' misogi-test)" != "true" ]; then
            echo "::error::Container failed to start"
            docker logs misogi-test
            exit 1
          fi

          echo "Container started successfully"

      - name: Verify health endpoint
        run: |
          # Wait for health endpoint to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:3001/api/v1/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done

          echo "::warning::Health endpoint not responding (may be expected for sender-only mode)"
          docker logs misogi-test

      - name: Cleanup
        if: always()
        run: |
          docker stop misogi-test || true
          docker rm misogi-test || true

  # ===========================================================================
  # Job 4: Summary — Docker CI Status
  # ===========================================================================

  summary:
    name: Docker CI Summary
    runs-on: ubuntu-latest
    needs: [docker-lint, docker-build, docker-test]
    if: always()
    steps:
      - name: Check CI status
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          echo "## Docker CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          for job in docker-lint docker-build docker-test; do
            status=$(echo "$NEEDS_CONTEXT" | jq -r ".${job}.result")
            case "$status" in
              success) emoji="✅" ;;
              failure) emoji="❌" ;;
              skipped) emoji="⏭️" ;;
              *) emoji="❓" ;;
            esac
            echo "| $job | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
