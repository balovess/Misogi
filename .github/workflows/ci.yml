name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  check-linux:
    name: Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (strict)
        run: cargo clippy --workspace -- -D warnings -D clippy::all
      - name: Compile check (all targets)
        run: cargo check --workspace --all-targets
      - name: Documentation check
        run: cargo doc --workspace --no-deps

  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (strict)
        run: cargo clippy --workspace -- -D warnings
      - name: Compile check (all targets)
        run: cargo check --workspace --all-targets

  test-linux:
    name: Test (Linux)
    needs: check-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --workspace -- --nocapture

  test-windows:
    name: Test (Windows)
    needs: check-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        run: cargo test --workspace -- --nocapture

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Fetch advisory database
        run: cargo audit --fetch
      - name: Run audit
        run: cargo audit

  wasm-gate:
    name: WASM Compile Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: workspace-wasm-${{ hashFiles('**/Cargo.lock') }}
      - name: WASM compile check
        run: cargo check -p misogi-wasm --target wasm32-unknown-unknown
