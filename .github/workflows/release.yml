# =============================================================================
# Release Pipeline
# =============================================================================
#
# Automated release workflow for Misogi CDR system.
#
# Triggers:
#   - Push version tag (v*.*.*)
#   - Manual dispatch
#
# Jobs:
#   1. validate-version  — Version validation
#   2. build-binaries    — Multi-platform binary builds
#   3. build-wasm        — WASM package build
#   4. create-release    — Create GitHub Release with artifacts
#
# Note: crates.io publishing is not included. Use manual publish if needed.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ===========================================================================
  # Job 1: Validate Version
  # ===========================================================================
  # Extracts and validates the version from tag or input.

  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Extract version from tag (remove 'v' prefix)
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          # Validate version format
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi

          # Check if pre-release
          if [[ "$VERSION" =~ - ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Pre-release: $IS_PRERELEASE"

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]; then
            echo "::warning::Tag version (${{ steps.version.outputs.version }}) differs from Cargo.toml ($CARGO_VERSION)"
          fi

  # ===========================================================================
  # Job 2: Build Binaries — Multi-Platform
  # ===========================================================================
  # Builds release binaries for Linux, Windows, and macOS.

  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: misogi-linux-x86_64
            ext: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: misogi-linux-aarch64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: misogi-windows-x86_64
            ext: '.exe'
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: misogi-macos-x86_64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: misogi-macos-aarch64
            ext: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          # Copy main binaries
          cp target/${{ matrix.target }}/release/misogi-sender${{ matrix.ext }} artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/misogi-receiver${{ matrix.ext }} artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/misogi-smtp${{ matrix.ext }} artifacts/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/misogi-nocode${{ matrix.ext }} artifacts/ 2>/dev/null || true
          # Include documentation
          cp README.md artifacts/ 2>/dev/null || true
          cp LICENSE artifacts/ 2>/dev/null || true
          # Create archive
          tar -czvf ${{ matrix.artifact_name }}.tar.gz -C artifacts .

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item target/${{ matrix.target }}/release/*.exe artifacts/ -ErrorAction SilentlyContinue
          Copy-Item README.md artifacts/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE artifacts/ -ErrorAction SilentlyContinue
          Compress-Archive -Path artifacts/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Job 3: Build WASM Package
  # ===========================================================================
  # Builds optimized WASM package for browser deployment.

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build WASM package
        run: |
          wasm-pack build crates/misogi-wasm \
            --target web \
            --release \
            --out-dir wasm-pkg \
            -- \
            --no-default-features \
            --features browser

      - name: Install Binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Optimize WASM binary
        run: |
          wasm-opt -Oz wasm-pkg/misogi_wasm_bg.wasm -o wasm-pkg/misogi_wasm_bg.wasm

      - name: Create WASM archive
        run: |
          tar -czvf misogi-wasm.tar.gz -C wasm-pkg .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: misogi-wasm
          path: misogi-wasm.tar.gz
          retention-days: 30

  # ===========================================================================
  # Job 4: Create GitHub Release
  # ===========================================================================
  # Creates GitHub Release with all artifacts attached.

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate-version, build-binaries, build-wasm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          IS_PRERELEASE="${{ needs.validate-version.outputs.is_prerelease }}"

          # Generate release notes from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Extract section for this version
            NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
            if [ -z "$NOTES" ]; then
              NOTES="## Release v$VERSION\n\nSee [CHANGELOG.md](CHANGELOG.md) for details."
            fi
          else
            NOTES="## Release v$VERSION"
          fi

          # Save to file for multiline output
          echo "$NOTES" > release_notes.md
          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Misogi v${{ needs.validate-version.outputs.version }}
          body_path: release_notes.md
          prerelease: ${{ needs.validate-version.outputs.is_prerelease == 'true' }}
          draft: false
          files: |
            artifacts/misogi-linux-x86_64/misogi-linux-x86_64.tar.gz
            artifacts/misogi-linux-aarch64/misogi-linux-aarch64.tar.gz
            artifacts/misogi-windows-x86_64/misogi-windows-x86_64.zip
            artifacts/misogi-macos-x86_64/misogi-macos-x86_64.tar.gz
            artifacts/misogi-macos-aarch64/misogi-macos-aarch64.tar.gz
            artifacts/misogi-wasm/misogi-wasm.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
