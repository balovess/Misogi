# =============================================================================
# WASM Production Pipeline — Multi-Platform GitHub Actions CI
# =============================================================================
#
# Platform Support:
#   - Linux (ubuntu-latest)    — Primary WASM build platform
#   - macOS (macos-latest)     — Apple Silicon WASM support
#   - Windows (windows-latest) — Windows WASM build
#
# Browser Testing:
#   - Chromium  — Cross-platform browser tests
#   - Firefox   — Linux/macOS only (Windows has Playwright issues)
#   - WebKit    — macOS only (Safari engine)
#
# Jobs:
#   1. native-check     — Rust fmt/clippy/check validation
#   2. wasm-build       — WASM pack build + wasm-opt optimization + size check
#   3. benchmarks       — Criterion performance benchmarks
#   4. browser-compat   — Playwright browser compatibility tests

name: WASM Production Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'crates/misogi-wasm/**'
      - 'crates/misogi-cdr/**'
      - 'crates/misogi-core/**'
      - 'examples/wasm-browser/**'
      - 'scripts/optimize-wasm.sh'
  pull_request:
    paths:
      - 'crates/misogi-wasm/**'
      - 'crates/misogi-cdr/**'
      - 'crates/misogi-core/**'
      - 'examples/wasm-browser/**'
      - 'scripts/optimize-wasm.sh'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # WASM size budgets
  WASM_RAW_LIMIT: 8388608   # 8 MB
  WASM_GZIP_LIMIT: 3145728  # 3 MB

# =============================================================================
# Concurrency Control — Cancel redundant workflow runs
# =============================================================================

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Native Compilation Check
  # ===========================================================================
  # Validates code quality before expensive WASM compilation.

  native-check:
    name: Native Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-native-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy -p misogi-wasm -- -D warnings

      - name: Compile check
        run: cargo check -p misogi-wasm

  # ===========================================================================
  # Job 2: WASM Build & Size Validation (Multi-Platform)
  # ===========================================================================
  # Builds WASM package with wasm-pack, optimizes with wasm-opt,
  # and validates against size budgets (raw < 8MB, gzip < 3MB).

  wasm-build:
    name: WASM Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: native-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_suffix: linux
          - os: macos-latest
            artifact_suffix: macos
          - os: windows-latest
            artifact_suffix: windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-build-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install wasm-pack (Unix)
        if: runner.os != 'Windows'
        run: |
          curl https://rustwasm.github.io/install/init.sh -sSf | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install wasm-pack (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/rustwasm/wasm-pack/releases/download/v0.12.1/wasm-pack-v0.12.1-x86_64-pc-windows-msvc.zip" -OutFile "wasm-pack.zip"
          Expand-Archive -Path "wasm-pack.zip" -DestinationPath "."
          echo "$((Get-Item .).FullName)\wasm-pack-v0.12.1-x86_64-pc-windows-msvc" >> $env:GITHUB_PATH

      - name: Build WASM package (Unix)
        if: runner.os != 'Windows'
        run: |
          wasm-pack build crates/misogi-wasm \
            --target web \
            --release \
            --out-dir wasm-pkg \
            -- \
            --no-default-features \
            --features browser

      - name: Build WASM package (Windows)
        if: runner.os == 'Windows'
        run: |
          wasm-pack build crates/misogi-wasm --target web --release --out-dir wasm-pkg -- --no-default-features --features browser

      - name: Install Binaryen (wasm-opt) (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Install Binaryen (wasm-opt) (macOS)
        if: runner.os == 'macOS'
        run: brew install binaryen

      - name: Install Binaryen (wasm-opt) (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-windows.tar.gz" -OutFile "binaryen.tar.gz"
          tar -xzf binaryen.tar.gz
          echo "$((Get-Item .).FullName)\binaryen-version_116-x86_64-windows\bin" >> $env:GITHUB_PATH

      - name: Optimize WASM binary (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/optimize-wasm.sh
          ./scripts/optimize-wasm.sh \
            wasm-pkg/misogi_wasm_bg.wasm \
            optimized.wasm

      - name: Optimize WASM binary (Windows)
        if: runner.os == 'Windows'
        run: |
          wasm-opt -Oz wasm-pkg/misogi_wasm_bg.wasm -o optimized.wasm

      - name: Validate size budgets (Unix)
        if: runner.os != 'Windows'
        run: |
          RAW_SIZE=$(stat -c%s optimized.wasm 2>/dev/null || stat -f%z optimized.wasm)
          GZIP_SIZE=$(gzip -c optimized.wasm | wc -c)

          echo "Raw size : $RAW_SIZE bytes"
          echo "Gzip size: $GZIP_SIZE bytes"

          if (( RAW_SIZE > ${{ env.WASM_RAW_LIMIT }} )); then
            echo "::error::Raw WASM size ($RAW_SIZE bytes) exceeds 8MB limit"
            exit 1
          fi

          if (( GZIP_SIZE > ${{ env.WASM_GZIP_LIMIT }} )); then
            echo "::error::Gzip size ($GZIP_SIZE bytes) exceeds 3MB limit"
            exit 1
          fi

          echo "Size validation passed"

      - name: Validate size budgets (Windows)
        if: runner.os == 'Windows'
        run: |
          $rawSize = (Get-Item optimized.wasm).Length
          $gzipSize = (Get-Content optimized.wasm | gzip | Measure-Object -Character).Characters

          Write-Host "Raw size : $rawSize bytes"
          Write-Host "Gzip size: $gzipSize bytes"

          if ($rawSize -gt ${{ env.WASM_RAW_LIMIT }}) {
            Write-Error "Raw WASM size ($rawSize bytes) exceeds 8MB limit"
            exit 1
          }

          if ($gzipSize -gt ${{ env.WASM_GZIP_LIMIT }}) {
            Write-Error "Gzip size ($gzipSize bytes) exceeds 3MB limit"
            exit 1
          }

          Write-Host "Size validation passed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-${{ matrix.artifact_suffix }}
          path: |
            optimized.wasm
            wasm-pkg/
          retention-days: 30

  # ===========================================================================
  # Job 3: Performance Benchmarks
  # ===========================================================================
  # Runs Criterion benchmarks for WASM performance regression detection.

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: native-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench -p misogi-wasm --bench wasm_perf -- --sample-size 20

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 90

  # ===========================================================================
  # Job 4: Browser Compatibility Tests (Multi-Browser)
  # ===========================================================================
  # Validates WASM module in real browsers via Playwright.
  # Matrix: Chromium (all platforms), Firefox (Linux/macOS), WebKit (macOS)

  browser-compat:
    name: Browser Tests (${{ matrix.browser }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: wasm-build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Chromium on all platforms
          - os: ubuntu-latest
            browser: chromium
          - os: macos-latest
            browser: chromium
          - os: windows-latest
            browser: chromium
          # Firefox on Linux and macOS (Windows has Playwright issues)
          - os: ubuntu-latest
            browser: firefox
          - os: macos-latest
            browser: firefox
          # WebKit (Safari) on macOS only
          - os: macos-latest
            browser: webkit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download WASM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-build-${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
          path: crates/misogi-wasm/pkg/

      - name: Install test dependencies
        working-directory: crates/misogi-wasm/tests/browser_compat
        run: npm ci

      - name: Install Playwright browsers
        working-directory: crates/misogi-wasm/tests/browser_compat
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        working-directory: crates/misogi-wasm/tests/browser_compat
        run: npx playwright test --project=${{ matrix.browser }} --reporter=list

      - name: Upload failure screenshots (if failed)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-${{ matrix.browser }}-${{ matrix.os }}
          path: crates/misogi-wasm/tests/browser_compat/screenshots/
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.os }}
          path: crates/misogi-wasm/tests/browser_compat/playwright-report/
          retention-days: 30

  # ===========================================================================
  # Job 5: Summary — WASM CI Status Aggregation
  # ===========================================================================

  summary:
    name: WASM CI Summary
    runs-on: ubuntu-latest
    needs: [native-check, wasm-build, benchmarks, browser-compat]
    if: always()
    steps:
      - name: Check CI status
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: |
          echo "## WASM CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          for job in native-check wasm-build benchmarks browser-compat; do
            status=$(echo "$NEEDS_CONTEXT" | jq -r ".${job}.result")
            case "$status" in
              success) emoji="✅" ;;
              failure) emoji="❌" ;;
              skipped) emoji="⏭️" ;;
              *) emoji="❓" ;;
            esac
            echo "| $job | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
