version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - "balovess"
    groups:
      production-dependencies:
        patterns:
          - "tokio"
          - "tonic"
          - "nom"
          - "serde"
          - "zip"
          - "bytes"
          - "thiserror"
          - "tracing"
          - "axum"
        update-types:
          - "minor"
          - "patch"
