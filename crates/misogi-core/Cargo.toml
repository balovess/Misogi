[package]
name = "misogi-core"
version = "0.1.0"
edition = "2024"
description = "Core library for Misogi file transfer system"

[dependencies]
tokio = { version = "1", features = ["full"] }
md-5 = "0.10"
serde = { version = "1", features = ["derive"] }
bytes = "1"
prost = "0.13"
tonic = "0.12"
uuid = { version = "1", features = ["v4"] }
thiserror = "2"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
hex-literal = "0.4"
serde_json = "1.0.149"
futures = "0.3"

[build-dependencies]
prost-build = "0.13"
tonic-build = { version = "0.12", features = ["transport"] }
