# Envoy Proxy Configuration for Misogi gRPC-Web
#
# This configuration enables browser-based gRPC-Web clients to communicate
# with the Misogi Rust gRPC backend via HTTP/1.1 translation.
#
# Architecture: Browser (gRPC-Web) → Envoy (:8080) → Misogi Tonic (:50051)
#
# Usage:
#   envoy -c public/envoy.yaml
#
# Admin interface available at http://localhost:9901

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: misogi_grpc
                            max_stream_duration:
                              seconds: 0
                            grpc:
                              max_request_bytes: 536870912  # 512MB
                http_filters:
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.router
                    typed_config: {}

  clusters:
    - name: misogi_grpc
      type: LOGICAL_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolConfig:
          "explicit_http_config":
            http2_protocol_options: {}
      load_assignment:
        cluster_name: misogi_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: localhost
                      port_value: 50051
