{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "misogi.fullname" . }}-networkpolicy
  labels:
    {{- include "misogi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "misogi.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  # ---- Ingress Rules ------------------------------------------------------
  ingress:
    # Allow from Ingress controller namespaces
    {{- range $ns := .Values.networkPolicy.ingressNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: "{{ $ns }}"
      ports:
        - protocol: TCP
          port: {{ $.Values.senderConfig.restApiPort }}
        - protocol: TCP
          port: {{ $.Values.senderConfig.grpcPort }}
        - protocol: TCP
          port: {{ $.Values.smtpConfig.smtpPort }}
        - protocol: TCP
          port: {{ $.Values.smtpConfig.smtpSubmissionPort }}
    {{- end }}

    # Allow inter-pod communication within Misogi
    - from:
        - podSelector:
            matchLabels:
              {{- include "misogi.selectorLabels" $ | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.senderConfig.grpcPort }}
        - protocol: TCP
          port: {{ $.Values.receiverConfig.grpcPort }}

  # ---- Egress Rules -------------------------------------------------------
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow egress to PostgreSQL
    {{- if .Values.networkPolicy.egressRules.allowToPostgres }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}

    # Allow egress to Redis
    {{- if .Values.networkPolicy.egressRules.allowToRedis }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}

    # Allow egress to external scanner endpoints
    {{- if .Values.networkPolicy.egressRules.allowToExternalScanners }}
    {{- range .Values.networkPolicy.egressRules.scannerPorts }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ . }}
    {{- end }}
    {{- end }}

  # Default deny all other traffic (implicit via empty rules)
{{- end }}
