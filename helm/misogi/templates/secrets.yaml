apiVersion: v1
kind: Secret
metadata:
  name: {{ include "misogi.fullname" . }}-secrets
  labels:
    {{- include "misogi.labels" . | nindent 4 }}
type: Opaque
# NOTE: For production, pre-create this secret using:
#   kubectl create secret generic misogi-secrets \
#     --from-literal=database-url=postgres://... \
#     --from-literal=redis-url=redis://... \
#     --literal-file=private.pem=... \
#     --literal-file=public.pem=...
#
# Or use an external secret manager (Vault, External Secrets Operator).
stringData:
  database-url: {{ .Values.postgresql.auth.database | default "misogi_audit" | printf "postgres://%s:%s@%s:%s/%s" .Values.postgresql.auth.username (default "" .Values.postgresql.auth.password) (printf "%s-postgres" (include "misogi.fullname" .)) "5432" | quote }}
  redis-url: {{ printf "redis://:%s@%s-redis-master:6379" (default "" .Values.redis.auth.password) (include "misogi.fullname" .) | quote }}
  ldap-bind-password: ""
  oidc-client-secret: ""
  api-keys: "[]"
